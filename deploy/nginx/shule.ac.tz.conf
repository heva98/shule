server {
    listen 80;
    server_name shule.ac.tz www.shule.ac.tz;

    client_max_body_size 20M;

    location /static/ {
        alias /home/deployuser/shule/staticfiles/;
    }

    location /media/ {
        alias /home/deployuser/shule/media/;
    }

    # Student documents (birth certificates, medical forms, national IDs, transfer
    # letters) are sensitive — never serve them directly. The only legitimate path
    # to their bytes is /api/documents/<pk>/download/, which checks the requesting
    # user's role in Django before internally redirecting here.
    location /media/student_documents/ {
        deny all;
        return 403;
    }

    location /protected-media/ {
        internal;
        alias /home/deployuser/shule/media/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /home/deployuser/shule/shule-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
